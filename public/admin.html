        }
        
        .admin-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .admin-header {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;

        }
        
        .admin-header h1 {

        .admin-header p {

        .admin-tabs {

    <!-- CKEditor 5 -->
    <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

    <script>
        // 認証チェック
        (async function checkAdminAuth() {
            const res = await fetch('/api/user');
            if (!res.ok) {
                window.location.href = 'auth.html';
                return;
            }
            const user = await res.json();
            if (user.userType !== 'admin') {
                alert('管理者権限が必要です');
                window.location.href = 'auth.html';
            }
        })();

        let currentRejectId = null;
        let loadPendingPatents = null;
        let columnEditorInstance = null;
        let interviewEditorInstance = null;

        // ============ 画像をBase64で埋め込むアダプター ============
        class Base64UploadAdapter {
            constructor(loader) { this.loader = loader; }
            upload() {
                return this.loader.file.then(file => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve({ default: reader.result });
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                }));
            }
            abort() {}
        }
        function Base64UploaderPlugin(editor) {
            editor.plugins.get('FileRepository').createUploadAdapter = (loader) => {
                return new Base64UploadAdapter(loader);
            };
        }

        // ============ CKEditor 初期化 ============
        const editorConfig = {
            toolbar: ['heading','|','bold','italic','underline','strikethrough','|',
                      'bulletedList','numberedList','|','blockQuote','insertTable','|',
                      'link','uploadImage','|','undo','redo'],
            extraPlugins: [Base64UploaderPlugin],
            language: 'ja',
            image: {
                toolbar: ['imageTextAlternative','|','imageStyle:inline','imageStyle:block','imageStyle:side']
            }
        };

        ClassicEditor.create(document.getElementById('columnEditor'), editorConfig)
            .then(editor => { columnEditorInstance = editor; }).catch(console.error);

        ClassicEditor.create(document.getElementById('interviewEditor'), editorConfig)
            .then(editor => { interviewEditorInstance = editor; }).catch(console.error);

        // ============ コラム保存 ============
        window.saveColumn = async function() {
            const editId = document.getElementById('columnEditId').value;
            const body = {
                type: 'column',
                title:    document.getElementById('columnTitle').value.trim(),
                excerpt:  document.getElementById('columnExcerpt').value.trim(),
                content:  columnEditorInstance ? columnEditorInstance.getData() : '',
                category: document.getElementById('columnCategory').value,
                author:   document.getElementById('columnAuthor').value.trim() || '編集部',
                featured_image: document.getElementById('columnImage').value.trim() || null,
                status:   document.getElementById('columnStatus').value
            };
            if (!body.title) return alert('タイトルを入力してください');
            if (!body.content) return alert('本文を入力してください');

            const url    = editId ? `/api/admin/articles/${editId}` : '/api/admin/articles';
            const method = editId ? 'PUT' : 'POST';

            const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify(body) });
            if (res.ok) {
                alert(editId ? 'コラムを更新しました' : 'コラムを投稿しました');
                resetColumnForm();
                loadColumnList();
            } else {
                const err = await res.json();
                alert('エラー: ' + err.error);
            }
        };

        window.resetColumnForm = function() {
            document.getElementById('columnEditId').value = '';
            document.getElementById('columnFormTitle').textContent = ' 新規コラム投稿';
            document.getElementById('columnTitle').value = '';
            document.getElementById('columnExcerpt').value = '';
            document.getElementById('columnAuthor').value = '編集部';
            document.getElementById('columnImage').value = '';
            document.getElementById('columnStatus').value = 'published';
            if (columnEditorInstance) columnEditorInstance.setData('');
        };

        window.editColumn = async function(id) {
            const res = await fetch(`/api/admin/articles/${id}`, { credentials: 'include' });
            if (!res.ok) return alert('記事の取得に失敗しました');
            const a = await res.json();
            document.getElementById('columnEditId').value = a.id;
            document.getElementById('columnFormTitle').textContent = '️ コラム編集';
            document.getElementById('columnTitle').value = a.title || '';
            document.getElementById('columnExcerpt').value = a.excerpt || '';
            document.getElementById('columnAuthor').value = a.author || '編集部';
            document.getElementById('columnImage').value = a.featured_image || '';
            document.getElementById('columnCategory').value = a.category || 'patent-basics';
            document.getElementById('columnStatus').value = a.status || 'published';
            if (columnEditorInstance) columnEditorInstance.setData(a.content || '');
            document.getElementById('columns-tab').scrollIntoView({ behavior: 'smooth' });
        };

        window.deleteColumn = async function(id) {
            if (!confirm('このコラムを削除しますか？')) return;
            const res = await fetch(`/api/admin/articles/${id}`, { method: 'DELETE', credentials: 'include' });
            if (res.ok) { alert('削除しました'); loadColumnList(); }
            else alert('削除に失敗しました');
        };

        async function loadColumnList() {
            const res = await fetch('/api/admin/articles?type=column', { credentials: 'include' });
            if (!res.ok) return;
            const articles = await res.json();
            const container = document.getElementById('columnList');
            if (articles.length === 0) {
                container.innerHTML = '<p style="color:#95a5a6;text-align:center;">コラムはまだありません</p>';
                return;
            }
            const categoryNames = { 'patent-basics':'特許基礎知識','technology-trend':'技術トレンド','case-study':'活用事例','legal':'法律・制度' };
            container.innerHTML = articles.map(a => `
                <div class="content-item">
                    <div class="content-item-header">
                        <div>
                            <div class="content-item-title">${a.title}</div>
                            <div class="content-item-meta">
                                ${categoryNames[a.category] || a.category} ／
                                ${a.status === 'published' ? ' 公開中' : ' 下書き'} ／
                                ${new Date(a.created_at).toLocaleDateString('ja-JP')}
                            </div>
                        </div>
                        <div class="content-actions">
                            <button class="btn-small btn-edit-small" onclick="editColumn('${a.id}')">編集</button>
                            <button class="btn-small btn-delete-small" onclick="deleteColumn('${a.id}')">削除</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        // ============ インタビュー保存 ============
        window.saveInterview = async function() {
            const editId = document.getElementById('interviewEditId').value;
            const body = {
                type: 'interview',
                title:       document.getElementById('interviewTitle').value.trim(),
                excerpt:     document.getElementById('interviewExcerpt').value.trim(),
                content:     interviewEditorInstance ? interviewEditorInstance.getData() : '',
                category:    document.getElementById('interviewCategory').value,
                researcher:  document.getElementById('interviewResearcher').value.trim(),
                affiliation: document.getElementById('interviewAffiliation').value.trim(),
                featured_image: document.getElementById('interviewImage').value.trim() || null,
                status:      document.getElementById('interviewStatus').value
            };
            if (!body.title) return alert('タイトルを入力してください');
            if (!body.content) return alert('本文を入力してください');

            const url    = editId ? `/api/admin/articles/${editId}` : '/api/admin/articles';
            const method = editId ? 'PUT' : 'POST';

            const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify(body) });
            if (res.ok) {
                alert(editId ? 'インタビューを更新しました' : 'インタビューを投稿しました');
                resetInterviewForm();
                loadInterviewList();
            } else {
                const err = await res.json();
                alert('エラー: ' + err.error);
            }
        };

        window.resetInterviewForm = function() {
            document.getElementById('interviewEditId').value = '';
            document.getElementById('interviewFormTitle').textContent = ' 新規インタビュー投稿';
            document.getElementById('interviewTitle').value = '';
            document.getElementById('interviewExcerpt').value = '';
            document.getElementById('interviewResearcher').value = '';
            document.getElementById('interviewAffiliation').value = '';
            document.getElementById('interviewImage').value = '';
            document.getElementById('interviewStatus').value = 'published';
            if (interviewEditorInstance) interviewEditorInstance.setData('');
        };

        window.editInterview = async function(id) {
            const res = await fetch(`/api/admin/articles/${id}`, { credentials: 'include' });
            if (!res.ok) return alert('記事の取得に失敗しました');
            const a = await res.json();
            document.getElementById('interviewEditId').value = a.id;
            document.getElementById('interviewFormTitle').textContent = '️ インタビュー編集';
            document.getElementById('interviewTitle').value = a.title || '';
            document.getElementById('interviewExcerpt').value = a.excerpt || '';
            document.getElementById('interviewResearcher').value = a.researcher || '';
            document.getElementById('interviewAffiliation').value = a.affiliation || '';
            document.getElementById('interviewImage').value = a.featured_image || '';
            document.getElementById('interviewCategory').value = a.category || 'university-researcher';
            document.getElementById('interviewStatus').value = a.status || 'published';
            if (interviewEditorInstance) interviewEditorInstance.setData(a.content || '');
            document.getElementById('interviews-tab').scrollIntoView({ behavior: 'smooth' });
        };

        window.deleteInterview = async function(id) {
            if (!confirm('このインタビューを削除しますか？')) return;
            const res = await fetch(`/api/admin/articles/${id}`, { method: 'DELETE', credentials: 'include' });
            if (res.ok) { alert('削除しました'); loadInterviewList(); }
            else alert('削除に失敗しました');
        };

        async function loadInterviewList() {
            const res = await fetch('/api/admin/articles?type=interview', { credentials: 'include' });
            if (!res.ok) return;
            const articles = await res.json();
            const container = document.getElementById('interviewList');
            if (articles.length === 0) {
                container.innerHTML = '<p style="color:#95a5a6;text-align:center;">インタビューはまだありません</p>';
                return;
            }
            const categoryNames = { 'university-researcher':'大学研究者','corporate-researcher':'企業研究者','startup':'スタートアップ' };
            container.innerHTML = articles.map(a => `
                <div class="content-item">
                    <div class="content-item-header">
                        <div>
                            <div class="content-item-title">${a.title}</div>
                            <div class="content-item-meta">
                                ${a.researcher ? a.researcher + ' ／ ' : ''}
                                ${a.affiliation || ''} ／
                                ${categoryNames[a.category] || a.category} ／
                                ${a.status === 'published' ? ' 公開中' : ' 下書き'} ／
                                ${new Date(a.created_at).toLocaleDateString('ja-JP')}
                            </div>
                        </div>
                        <div class="content-actions">
                            <button class="btn-small btn-edit-small" onclick="editInterview('${a.id}')">編集</button>
                            <button class="btn-small btn-delete-small" onclick="deleteInterview('${a.id}')">削除</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        // ============ グローバル：特許関連 ============
        window.approvePatent = async function(id) {
            if (!confirm('この特許を承認しますか？')) return;
            
            try {
                const response = await fetch(`/api/admin/patents/${id}/approve`, {
                    method: 'PUT'
                });
                
                if (response.ok) {
                    alert('特許を承認しました');
                    if (loadPendingPatents) loadPendingPatents();
                } else {
                    alert('承認に失敗しました');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('エラーが発生しました');
            }
        };
        
        window.openRejectModal = function(id) {
            currentRejectId = id;
            document.getElementById('rejectModal').classList.add('active');
        };
        
        // DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
        
        // タブ切り替え
        document.querySelectorAll('.admin-tab[data-tab]').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;

                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(`${targetTab}-tab`).classList.add('active');

                // タブ切り替え時に一覧を更新
                if (targetTab === 'columns')    loadColumnList();
                if (targetTab === 'interviews') loadInterviewList();
            });
        });
        
        
        // 承認待ち特許を取得
        loadPendingPatents = async function() {
            try {
                console.log(' 承認待ち特許を読み込み中...');
                const response = await fetch('/api/admin/patents/pending', { credentials: 'include' });
                console.log(' APIレスポンス:', response.status, response.statusText);
                
                if (response.ok) {
                    const patents = await response.json();
                    console.log(' 取得した特許数:', patents.length);
                    console.log(' 特許データ:', patents);
                    displayPendingPatents(patents);
                    updateStats();
                } else {
                    const errorText = await response.text();
                    console.error(' Failed to load pending patents:', response.status, errorText);
                    alert('承認待ち特許の取得に失敗しました');
                }
            } catch (error) {
                console.error(' Error:', error);
                alert('エラーが発生しました: ' + error.message);
            }
        };
        
        // 統計を更新
        async function updateStats() {
            try {
                const response = await fetch('/api/patents?owner=all', { credentials: 'include' });
                if (response.ok) {
                    const allPatents = await response.json();
                    
                    const pending = allPatents.filter(p => p.approval_status === 'pending').length;
                    const approved = allPatents.filter(p => p.approval_status === 'approved').length;
                    const rejected = allPatents.filter(p => p.approval_status === 'rejected').length;
                    
                    document.getElementById('pendingCount').textContent = pending;
                    document.getElementById('approvedCount').textContent = approved;
                    document.getElementById('rejectedCount').textContent = rejected;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // 承認待ち特許を表示
        function displayPendingPatents(patents) {
            const container = document.getElementById('pendingList');
            
            if (patents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"></div>
                        <p>承認待ちの特許はありません</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = patents.map(patent => `
                <div class="patent-review-card">
                    <div class="review-header">
                        <div>
                            <div class="review-title">${patent.title}</div>
                            <div class="review-meta">
                                <span> 登録日: ${new Date(patent.created_at).toLocaleDateString('ja-JP')}</span>
                                <span> 出願者: ${patent.owner_name || '不明'}</span>
                                <span class="badge-pending">審査中</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="review-description">
                        <strong>概要:</strong><br>
                        ${patent.description}
                    </div>
                    
                    <div class="review-description">
                        <strong> 解決できる課題:</strong><br>
                        ${patent.problem || '未記入'}
                    </div>
                    
                    <div class="review-description">
                        <strong> 何にどう使えるか:</strong><br>
                        ${patent.usage || '未記入'}
                    </div>
                    
                    <div class="review-description">
                        <strong> 他の特許との違い:</strong><br>
                        ${patent.advantage || '未記入'}
                    </div>
                    
                    <div class="review-info">
                        <div class="info-item">
                            <span class="info-label">カテゴリー</span>
                            <span class="info-value">${getCategoryName(patent.category)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">特許番号</span>
                            <span class="info-value">${patent.patent_number || '-'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">ステータス</span>
                            <span class="info-value">利用可能</span>
                        </div>
                    </div>
                    
                    <div class="review-actions">
                        <button class="btn btn-approve" onclick="approvePatent('${patent.id}')">
                             承認
                        </button>
                        <button class="btn btn-reject" onclick="openRejectModal('${patent.id}')">
                             却下
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function getCategoryName(category) {
            const names = {
                'ai': 'AI・機械学習',
                'iot': 'IoT',
                'medical': '医療機器',
                'manufacturing': '製造技術',
                'energy': 'エネルギー'
            };
            return names[category] || category;
        }
        
        // モーダルを閉じる
        document.querySelector('.close-modal').addEventListener('click', () => {
            document.getElementById('rejectModal').classList.remove('active');
            document.getElementById('rejectReason').value = '';
        });
        
        // 却下フォーム送信
        document.getElementById('rejectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const reason = document.getElementById('rejectReason').value;
            
            try {
                const response = await fetch(`/api/admin/patents/${currentRejectId}/reject`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason })
                });
                
                if (response.ok) {
                    alert('特許を却下しました');
                    document.getElementById('rejectModal').classList.remove('active');
                    document.getElementById('rejectReason').value = '';
                    loadPendingPatents();
                } else {
                    alert('却下に失敗しました');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('エラーが発生しました');
            }
        });
        
        // ログアウト
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error:', error);
            }
        });
        
        // ページ読み込み時
        loadPendingPatents();

    }); // end DOMContentLoaded
    </script>
</body>
</html>
