<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特許詳細 - テックマッチ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            max-width: 900px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .detail-header {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .detail-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        .detail-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            color: #7f8c8d;
        }
        
        .detail-section {
            margin-bottom: 2rem;
        }
        
        .detail-section h3 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }
        
        .detail-info-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .detail-label {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .interest-form {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 8px;
            margin-top: 2rem;
        }
        
        .interest-form h3 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        .interest-form textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 1rem;
            min-height: 120px;
            margin-bottom: 1rem;
        }
        
        .price-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 1rem 0;
        }
        
        .back-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #95a5a6;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 1rem;
        }
        
        .back-btn:hover {
            background-color: #7f8c8d;
        }
    </style>
    <link rel="stylesheet" href="stylish-common.css">
</head>
<body>
    <div class="bg-decoration"></div>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">TechMatch</a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">特許一覧</a>
                    <a href="column.html" class="nav-link">技術コラム</a>
                    <a href="interview.html" class="nav-link">研究者インタビュー</a>
                    <a href="contact.html" class="nav-link">お問い合わせ</a>
                    <a href="auth.html" class="btn-primary">ログイン</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <a href="index.html" class="back-btn">← 一覧に戻る</a>
            
            <div class="detail-container" id="patentDetail">
                <p style="text-align: center; color: #7f8c8d;">読み込み中...</p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 テックマッチ All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        let currentUser = null;
        
        // ログイン状態チェック
        async function checkAuth() {
            try {
                const response = await fetch('/api/user');
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    document.getElementById('authLink').textContent = 'マイページ';
                    document.getElementById('authLink').href = 'mypage.html';
                }
            } catch (error) {
                // ログインしていない状態
            }
        }
        
        // URLパラメータから特許IDを取得
        function getPatentId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }
        
        // 特許詳細を読み込み
        async function loadPatentDetail() {
            const patentId = getPatentId();
            
            if (!patentId) {
                document.getElementById('patentDetail').innerHTML = '<p style="text-align: center; color: #e74c3c;">特許IDが指定されていません。</p>';
                return;
            }
            
            try {
                const response = await fetch(`/api/patents/${patentId}`);
                
                if (!response.ok) {
                    document.getElementById('patentDetail').innerHTML = '<p style="text-align: center; color: #e74c3c;">特許が見つかりません。</p>';
                    return;
                }
                
                const patent = await response.json();
                displayPatentDetail(patent);
            } catch (error) {
                document.getElementById('patentDetail').innerHTML = '<p style="text-align: center; color: #e74c3c;">読み込みエラーが発生しました。</p>';
            }
        }
        
        // 特許詳細を表示
        function displayPatentDetail(patent) {
            const categoryNames = {
                ai: 'AI・機械学習',
                iot: 'IoT',
                medical: '医療機器',
                manufacturing: '製造技術',
                energy: 'エネルギー'
            };
            
            const statusNames = {
                available: '利用可能',
                negotiation: '交渉中'
            };
            
            const container = document.getElementById('patentDetail');
            
            let interestFormHTML = '';
            if (currentUser && currentUser.id !== patent.ownerId) {
                interestFormHTML = `
                    <div class="interest-form">
                        <h3>この特許に興味がありますか?</h3>
                        <p style="color: #7f8c8d; margin-bottom: 1rem;">興味表明を送信すると、特許の出願者に通知されます。</p>
                        <form id="interestForm">
                            <textarea id="interestMessage" placeholder="興味を持った理由やご質問などを記入してください..." required></textarea>
                            <button type="submit" class="action-btn">興味を表明する</button>
                        </form>
                    </div>
                `;
            } else if (!currentUser) {
                interestFormHTML = `
                    <div class="interest-form">
                        <h3>この特許に興味がありますか?</h3>
                        <p style="color: #7f8c8d; margin-bottom: 1rem;">興味表明を行うには<a href="auth.html" style="color: #3498db;">ログイン</a>が必要です。</p>
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="detail-header">
                    <h1 class="detail-title">${patent.title}</h1>
                    <div class="detail-meta">
                        <span class="card-category">${categoryNames[patent.category]}</span>
                        <span class="card-status ${patent.status}">${statusNames[patent.status]}</span>
                        <span>${new Date(patent.createdAt).toLocaleDateString()}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>特許情報</h3>
                    <div class="detail-info-grid">
                        <div class="detail-label">特許番号:</div>
                        <div>${patent.patentNumber}</div>
                        
                        <div class="detail-label">出願者:</div>
                        <div>${patent.ownerName}</div>
                        
                        <div class="detail-label">カテゴリー:</div>
                        <div>${categoryNames[patent.category]}</div>
                    </div>
                    
                    <div class="price-tag">
                        希望価格: ¥${patent.price.toLocaleString()}
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>特許の説明</h3>
                    <p style="line-height: 1.8; color: #2c3e50;">${patent.description}</p>
                </div>
                
                ${patent.problem ? `
                <div class="detail-section">
                    <h3>🎯 解決できる課題</h3>
                    <p style="line-height: 1.8; color: #2c3e50;">${patent.problem}</p>
                </div>
                ` : ''}
                
                ${patent.usage ? `
                <div class="detail-section">
                    <h3>💡 何にどう使えるか</h3>
                    <p style="line-height: 1.8; color: #2c3e50;">${patent.usage}</p>
                </div>
                ` : ''}
                
                ${patent.advantage ? `
                <div class="detail-section">
                    <h3>⭐ 他の特許との違い</h3>
                    <p style="line-height: 1.8; color: #2c3e50;">${patent.advantage}</p>
                </div>
                ` : ''}
                
                ${interestFormHTML}
            `;
            
            // 興味表明フォームのイベントリスナー
            if (currentUser && currentUser.id !== patent.ownerId) {
                document.getElementById('interestForm').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    await submitInterest(patent.id);
                });
            }
        }
        
        // 興味表明を送信
        async function submitInterest(patentId) {
            const message = document.getElementById('interestMessage').value;
            
            try {
                const response = await fetch('/api/interests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patentId, message })
                });
                
                if (response.ok) {
                    alert('興味を表明しました！出願者に通知が送信されました。');
                    document.getElementById('interestMessage').value = '';
                } else {
                    const data = await response.json();
                    alert(data.error || '興味表明に失敗しました');
                }
            } catch (error) {
                alert('通信エラーが発生しました');
            }
        }
        
        // ページ読み込み時
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            await loadPatentDetail();
        });
    </script>
    <script src="check-auth.js"></script>
</body>
</html>
