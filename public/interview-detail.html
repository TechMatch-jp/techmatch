    <style>
        body {
            background: #f8f9fa;
        }
        
        .breadcrumb {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 0 1rem;
            font-size: 0.85rem;
            color: #1f2937;
        }
        
        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .article-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            padding: 2rem 1rem;
        }
        
        @media (max-width: 768px) {
            .article-wrapper {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }
        
        .article-main {
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        @media (max-width: 768px) {
            .article-main {
                padding: 2rem 1.5rem;
            }
        }
        
        .article-category-tags {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .article-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.4rem 0.9rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .article-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .article-title {
                font-size: 1.5rem;
            }
        }
        
        .article-meta {
            display: flex;
            gap: 1.5rem;
            color: #1f2937;
            font-size: 0.9rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e8ecef;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .social-share {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e8ecef;
        }
        
        .share-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            font-size: 0.75rem;
        }
        
        .share-btn:hover {
            transform: scale(1.1);
        }
        
        .share-twitter {
            background: #1DA1F2;
        }
        
        .share-facebook {
            background: #1877f2;
        }
        
        .share-line {
            background: #00B900;
        }
        
        .toc {
            background: #f8f9fa;
            border: 2px solid #e8ecef;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 2rem 0;
        }
        
        .toc-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #2c3e50;
        }
        
        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .toc-list li {
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        
        .toc-list a {
            color: #667eea;
            text-decoration: none;
            display: block;
            padding: 0.3rem 0;
        }
        
        .toc-list a:hover {
            text-decoration: underline;
        }
        
        .article-content {
            line-height: 1.9;
            color: #2c3e50;
            font-size: 1.05rem;
        }
        
        /* CKEditorのスタイルを反映 */
        .article-content ul {
            list-style-type: disc;
            padding-left: 2rem;
            margin: 1rem 0;
        }
        
        .article-content ol {
            list-style-type: decimal;
            padding-left: 2rem;
            margin: 1rem 0;
        }
        
        .article-content ul li {
            display: list-item;
            margin-bottom: 0.5rem;
        }
        
        .article-content ol li {
            display: list-item;
            margin-bottom: 0.5rem;
        }
        
        .article-content strong {
            font-weight: bold;
        }
        
        .article-content em {
            font-style: italic;
        }
        
        .article-content u {
            text-decoration: underline;
        }
        
        .article-content s {
            text-decoration: line-through;
        }
        
        .article-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5rem 0;
        }
        
        .article-content table td,
        .article-content table th {
            border: 1px solid #ddd;
            padding: 0.75rem;
        }
        
        .article-content table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        
        .article-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 1rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #555;
        }
        
        .article-content h2 {
            font-size: 1.5rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: #2c3e50;
            border-left: 4px solid #667eea;
            padding-left: 1rem;
            font-weight: 700;
        }
        
        .article-content h3 {
            font-size: 1.3rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: #2c3e50;
            font-weight: 700;
        }
        
        .article-content p {
            margin-bottom: 1.5rem;
        }
        
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 2rem 0;
        }
        
        .back-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #374151;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 2rem;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #1f2937;
            transform: translateY(-2px);
        }
        
        /* サイドバー */
        .sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }
        
        .sidebar-widget {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .sidebar-widget h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #2c3e50;
        }
        
        .related-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #e8ecef;
        }
        
        .related-item:last-child {
            border-bottom: none;
        }
        
        .related-item a {
            color: #2c3e50;
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
        }
        
        .related-item a:hover {
            color: #667eea;
        }
        
        .related-date {
            font-size: 0.75rem;
            color: #374151;
            margin-top: 0.25rem;
        }

    <script>
        const categoryNames = {
            'ai': 'AI・機械学習',
            'iot': 'IoT',
            'medical': '医療機器',
            'manufacturing': '製造技術',
            'energy': 'エネルギー',
            'other': 'その他'
        };

        async function loadColumn() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (!id) {
                document.getElementById('articleContainer').innerHTML = '<p style="text-align: center; color: #e74c3c;">インタビューが見つかりません</p>';
                return;
            }
            
            try {
                const response = await fetch(`/api/interviews/${id}`);
                if (response.ok) {
                    const interview = await response.json();
                    displayColumn(interview);
                    loadRelatedArticles(interview.category);
                } else {
                    document.getElementById('articleContainer').innerHTML = '<p style="text-align: center; color: #e74c3c;">インタビューが見つかりません</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('articleContainer').innerHTML = '<p style="text-align: center; color: #e74c3c;">エラーが発生しました</p>';
            }
        }
        
        function displayColumn(interview) {
            // パンくず更新
            document.getElementById('breadcrumbTitle').textContent = interview.title;
            
            // 目次を生成
            const toc = generateTOC(interview.content);
            
            const container = document.getElementById('articleContainer');
            container.innerHTML = `
                <div class="article-category-tags">
                    <span class="article-category">${categoryNames[interview.category] || interview.category}</span>
                </div>
                
                <h1 class="article-title">${interview.title}</h1>
                
                <div class="article-meta">
                    <span> ${interview.researcher}</span>
                    <span> ${interview.affiliation}</span>
                    <span> ${new Date(interview.createdAt).toLocaleDateString('ja-JP')}</span>
                    <span> ${interview.readTime || '10分'}で読めます</span>
                </div>
                
                <div class="social-share">
                    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(interview.title)}&url=${encodeURIComponent(window.location.href)}" 
                       target="_blank" 
                       class="share-btn share-twitter">𝕏</a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" 
                       target="_blank" 
                       class="share-btn share-facebook">f</a>
                    <a href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}" 
                       target="_blank" 
                       class="share-btn share-line">L</a>
                </div>
                
                ${toc}
                
                <div class="article-content">
                    ${interview.content}
                </div>
                
                <div class="social-share" style="margin-top: 3rem;">
                    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(interview.title)}&url=${encodeURIComponent(window.location.href)}" 
                       target="_blank" 
                       class="share-btn share-twitter">𝕏</a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" 
                       target="_blank" 
                       class="share-btn share-facebook">f</a>
                    <a href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}" 
                       target="_blank" 
                       class="share-btn share-line">L</a>
                </div>
            `;
        }
        
        function generateTOC(content) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            const headings = tempDiv.querySelectorAll('h2, h3');
            
            if (headings.length === 0) return '';
            
            let tocHTML = '<div class="toc"><div class="toc-title">目次</div><ul class="toc-list">';
            
            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                const text = heading.textContent;
                tocHTML += `<li><a href="#${id}">${text}</a></li>`;
                heading.id = id;
            });
            
            tocHTML += '</ul></div>';
            
            // 元のコンテンツにIDを付与
            const updatedContent = tempDiv.innerHTML;
            return tocHTML;
        }
        
        async function loadRelatedArticles(category) {
            try {
                const response = await fetch('/api/interviews');
                if (response.ok) {
                    const interviews = await response.json();
                    const related = interviews
                        .filter(i => i.category === category)
                        .slice(0, 5);
                    
                    const relatedHTML = related.map(item => `
                        <div class="related-item">
                            <a href="interview-detail.html?id=${item.id}">${item.title}</a>
                            <div class="related-date">${new Date(item.createdAt).toLocaleDateString('ja-JP')}</div>
                        </div>
                    `).join('');
                    
                    document.getElementById('relatedArticles').innerHTML = relatedHTML || '<div class="related-item">関連記事がありません</div>';
                }
            } catch (error) {
                console.error('Error loading related articles:', error);
            }
        }
        
        loadColumn();
    </script>
<script>
(function(){
  var hb=document.getElementById('hamburger'),mm=document.getElementById('mobile-menu'),mc=document.getElementById('mobile-menu-close');
  function close(){hb&&hb.classList.remove('open');mm&&mm.classList.remove('open');}
  if(hb)hb.addEventListener('click',function(){hb.classList.toggle('open');mm.classList.toggle('open');});
  if(mc)mc.addEventListener('click',close);
  mm&&mm.querySelectorAll('a').forEach(function(a){a.addEventListener('click',close);});
})();
</script>
