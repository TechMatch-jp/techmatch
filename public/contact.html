<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - TechMatch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylish-common.css">
    <style>
        .contact-wrap {
            max-width: 680px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
        .contact-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 2.5rem 2rem;
        }
        .contact-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        .contact-lead {
            color: #555;
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.4rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group label .req {
            color: #e74c3c;
            margin-left: 4px;
            font-size: 0.8rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            background: #fafafa;
            transition: border-color 0.2s, background 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            background: #fff;
        }
        .form-group textarea {
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover:not(:disabled) {
            background: #2c2c4e;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .msg {
            padding: 0.9rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            display: none;
        }
        .msg-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .msg-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">TechMatch</a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">特許一覧</a>
                    <a href="column.html" class="nav-link">技術コラム</a>
                    <a href="interview.html" class="nav-link">研究者インタビュー</a>
                    <a href="contact.html" class="nav-link">お問い合わせ</a>
                    <a href="auth.html" class="btn-primary">ログイン</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="contact-wrap">
            <div class="contact-card">
                <h1 class="contact-title">お問い合わせ</h1>
                <p class="contact-lead">
                    ご質問・掲載のご相談など、お気軽にお問い合わせください。
                </p>

<form id="contactForm">
                    <div class="form-group">
                        <label for="name">お名前<span class="req">*</span></label>
                        <input type="text" id="name" placeholder="山田 太郎" required>
                    </div>

                    <div class="form-group">
                        <label for="company">会社名・所属</label>
                        <input type="text" id="company" placeholder="株式会社〇〇 / 〇〇大学">
                    </div>

                    <div class="form-group">
                        <label for="email">メールアドレス<span class="req">*</span></label>
                        <input type="email" id="email" placeholder="example@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">電話番号<span class="req">*</span></label>
                        <input type="tel" id="phone" placeholder="090-1234-5678" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">件名<span class="req">*</span></label>
                        <select id="subject" required>
                            <option value="">選択してください</option>
                            <option value="listing">掲載申請</option>
                            <option value="patent">特許への問い合わせ</option>
                            <option value="other">その他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">お問い合わせ内容<span class="req">*</span></label>
                        <textarea id="message" rows="7" placeholder="お問い合わせ内容をご記入ください" maxlength="3000" required oninput="updateCount(this)"></textarea>
                        <div class="hint"><span id="msgCount">0</span> / 3000文字</div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">送信する</button>
                    <div id="msgSuccess" class="msg msg-success" style="margin-top:1rem"></div>
                    <div id="msgError" class="msg msg-error" style="margin-top:1rem"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="about.html">会社概要</a>
                    <a href="terms.html">利用規約</a>
                    <a href="privacy.html">プライバシーポリシー</a>
                    <a href="contact.html">お問い合わせ</a>
                </div>
                <p>&copy; 2026 テックマッチ All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        function updateCount(el) {
            document.getElementById('msgCount').textContent = el.value.length;
        }

        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const successEl = document.getElementById('msgSuccess');
            const errorEl = document.getElementById('msgError');

            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '送信中...';

            const body = {
                name:    document.getElementById('name').value.trim(),
                company: document.getElementById('company').value.trim(),
                email:   document.getElementById('email').value.trim(),
                phone:   document.getElementById('phone').value.trim(),
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value.trim()
            };

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '送信に失敗しました');

                successEl.textContent = 'お問い合わせを受け付けました。確認メールをお送りしましたのでご確認ください。';
                successEl.style.display = 'block';
                document.getElementById('contactForm').reset();
            } catch (err) {
                errorEl.textContent = err.message || '送信に失敗しました。しばらく時間をおいてお試しください。';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '送信する';
            }
        });
    </script>
</body>
</html>
