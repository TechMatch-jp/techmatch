<!DOCTYPE html>
<html lang="ja">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-47LCYNSVRP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-47LCYNSVRP');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ - TechMatch</title>
<link rel="stylesheet" href="stylish-common.css">
<style>
.contact-wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 0 4rem;
}

.contact-card {
  background: white;
  border-radius: 24px;
  padding: 2.5rem;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(99,102,241,0.08);
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-group label {
  display: block;
  margin-bottom: 0.4rem;
  color: var(--gray-700);
  font-weight: 600;
  font-size: 0.875rem;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  font-size: 0.95rem;
  font-family: inherit;
  color: var(--gray-800);
  background: var(--gray-50);
  transition: all 0.2s ease;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary-400);
  background: white;
  box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
}

.form-group textarea {
  resize: vertical;
  min-height: 140px;
  line-height: 1.7;
}

.char-count {
  text-align: right;
  font-size: 0.78rem;
  color: var(--gray-400);
  margin-top: 0.25rem;
}

.submit-btn {
  width: 100%;
  padding: 0.875rem 1.5rem;
  background: var(--grad-brand);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-brand);
  margin-top: 0.5rem;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-brand-lg);
  filter: brightness(1.08);
}

.error-message {
  background: #fee2e2;
  color: #991b1b;
  padding: 0.875rem 1rem;
  border-radius: 10px;
  margin-bottom: 1rem;
  font-size: 0.875rem;
  font-weight: 500;
  display: none;
  border: 1px solid #fecaca;
}

.success-message {
  background: #d1fae5;
  color: #065f46;
  padding: 0.875rem 1rem;
  border-radius: 10px;
  margin-bottom: 1rem;
  font-size: 0.875rem;
  font-weight: 500;
  display: none;
  border: 1px solid #a7f3d0;
}
</style>
</head>
<body>
<div class="bg-decoration"></div>

<header class="header">
  <div class="container">
    <div class="header-content">
      <a href="index.html" class="logo">TechMatch</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">特許一覧</a>
        <a href="column.html" class="nav-link">技術コラム</a>
        <a href="interview.html" class="nav-link">研究者インタビュー</a>
        <a href="contact.html" class="nav-link active">お問い合わせ</a>
        <a href="auth.html" class="btn-primary">ログイン</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<div class="mobile-menu" id="mobile-menu">
  <button class="mobile-menu-close" id="mobile-menu-close">✕</button>
  <a href="index.html">特許一覧</a>
  <a href="column.html">技術コラム</a>
  <a href="interview.html">研究者インタビュー</a>
  <a href="contact.html">お問い合わせ</a>
  <a href="auth.html" class="btn-primary">ログイン</a>
</div>

<div class="container">
  <section class="page-header">
    <div class="page-header-badge">Contact</div>
    <h2>お問い合わせ</h2>
    <p>ご質問・ご相談はお気軽にお寄せください。担当者より折り返しご連絡いたします。</p>
  </section>

  <div class="contact-wrap">
    <div class="contact-card">
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <form id="contactForm">
        <div class="form-group">
          <label for="name">お名前 <span style="color:var(--danger)">*</span></label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" required>
        </div>
        <div class="form-group">
          <label for="email">メールアドレス <span style="color:var(--danger)">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@company.com" required>
        </div>
        <div class="form-group">
          <label for="subject">件名</label>
          <select id="subject" name="subject">
            <option value="">選択してください</option>
            <option value="patent-inquiry">特許に関するお問い合わせ</option>
            <option value="service-inquiry">サービスに関するお問い合わせ</option>
            <option value="partnership">パートナーシップについて</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">メッセージ <span style="color:var(--danger)">*</span></label>
          <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください" maxlength="1000" required oninput="updateCount(this)"></textarea>
          <div class="char-count"><span id="charCount">0</span> / 1000</div>
        </div>
        <button type="submit" class="submit-btn">送信する</button>
      </form>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-links">
      <a href="about.html" class="footer-link">会社概要</a>
      <a href="terms.html" class="footer-link">利用規約</a>
      <a href="privacy.html" class="footer-link">プライバシーポリシー</a>
      <a href="contact.html" class="footer-link">お問い合わせ</a>
    </div>
    <p>&copy; 2026 TechMatch All Rights Reserved.</p>
  </div>
</footer>

<script>
function updateCount(el) {
  document.getElementById('charCount').textContent = el.value.length;
}

document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errorEl = document.getElementById('errorMessage');
  const successEl = document.getElementById('successMessage');
  errorEl.style.display = 'none';
  successEl.style.display = 'none';

  const data = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    subject: document.getElementById('subject').value,
    message: document.getElementById('message').value
  };

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (res.ok) {
      successEl.textContent = 'お問い合わせを受け付けました。担当者よりご連絡いたします。';
      successEl.style.display = 'block';
      this.reset();
      document.getElementById('charCount').textContent = '0';
    } else {
      const d = await res.json();
      errorEl.textContent = d.error || '送信に失敗しました。再度お試しください。';
      errorEl.style.display = 'block';
    }
  } catch(err) {
    errorEl.textContent = 'エラーが発生しました。再度お試しください。';
    errorEl.style.display = 'block';
  }
});

const hb = document.getElementById('hamburger');
const mm = document.getElementById('mobile-menu');
const mc = document.getElementById('mobile-menu-close');
if (hb) hb.addEventListener('click', () => { hb.classList.toggle('open'); mm.classList.toggle('open'); });
if (mc) mc.addEventListener('click', () => { hb.classList.remove('open'); mm.classList.remove('open'); });
mm && mm.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { hb.classList.remove('open'); mm.classList.remove('open'); }));
</script>
</body>
</html>
