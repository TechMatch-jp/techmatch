    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ（ライセンサー） - テックマッチ</title>
    <link rel="stylesheet" href="stylish-common.css">
    <style>
        /* 売り手ページ識別バー */
        .page-identifier {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            padding: 0.8rem 0;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .page-identifier::before {
            content: ' ';
            margin-right: 0.5rem;
        }
        
        .mypage-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .mypage-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }
        
        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            height: fit-content;
        }
        
        .user-info {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e8ecef;
            margin-bottom: 1.5rem;
        }
        
        .user-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-top: 0.5rem;
        }
        
        .user-type {
            font-size: 0.9rem;
            color: #2ecc71;
            background: #d4edda;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            display: inline-block;
            margin-top: 0.5rem;
        }
        
        .sidebar-menu {
            list-style: none;
        }
        
        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }
        
        .sidebar-menu a {
            display: block;
            padding: 0.75rem 1rem;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }
        
        .logout-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1.5rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }
        
        .content-area {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .welcome-banner {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .welcome-banner h1 {
            margin-bottom: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e8ecef;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .add-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }
        
        .patent-card {
            background: white;
            border: 2px solid #e8ecef;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        
        .patent-card:hover {
            border-color: #2ecc71;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .patent-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .patent-meta {
            display: flex;
            gap: 1rem;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .patent-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-edit {
            padding: 0.5rem 1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .btn-delete {
            padding: 0.5rem 1rem;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        .table th {
            background: #f8f9fa;
            padding: 1rem;
            text-align: left;
            border-bottom: 2px solid #e8ecef;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .table td {
            padding: 1rem;
            border-bottom: 1px solid #e8ecef;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #95a5a6;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e8ecef;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
        }
    
        .subheading {
            font-size: 1rem;
            font-weight: 700;
            color: #2c3e50;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .status-badge {
            display: inline-block;
            font-size: 0.8rem;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            margin-left: 0.5rem;
            background: #e9ecef;
            color: #2c3e50;
            vertical-align: middle;
        }
        .status-badge.pending { background: #fff3cd; color: #856404; }
        .status-badge.approved { background: #d4edda; color: #155724; }
        .status-badge.rejected { background: #f8d7da; color: #721c24; }

    </style>
</head>
<body>
    <!-- 売り手ページ識別バー -->
    <div class="page-identifier">ライセンサー（売り手） マイページ</div>
    
    <div class="bg-decoration"></div>
    
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">TechMatch</a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">特許一覧</a>
                    <a href="column.html" class="nav-link">技術コラム</a>
                    <a href="interview.html" class="nav-link">研究者インタビュー</a>
                    <a href="mypage-seller.html" class="btn-primary">マイページ</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="mypage-container">
        <div class="mypage-grid">
            <!-- サイドバー -->
            <aside class="sidebar">
                <div class="user-info">
                    <div class="user-name" id="userName">読み込み中...</div>
                    <span class="user-type">ライセンサー（売り手）</span>
                </div>
                
                <ul class="sidebar-menu">
                    <li><a href="#" class="menu-link active" data-section="dashboard">ダッシュボード</a></li>
                    <li><a href="#" class="menu-link" data-section="patents">登録した特許</a></li>
                    <li><a href="#" class="menu-link" data-section="interests">受信した興味表明</a></li>
                </ul>
                
                <button class="logout-btn" id="logoutBtn">ログアウト</button>
            </aside>

            <!-- メインコンテンツ -->
            <main class="content-area">
                <!-- ダッシュボード -->
                <section class="section active" id="dashboard">
                    <div class="welcome-banner">
                        <h1>ようこそ、<span id="welcomeName"></span>さん</h1>
                        <p>テックマッチへようこそ。特許の仲介を始めましょう。</p>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="patentCount">0</div>
                            <div class="stat-label">登録特許数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="interestCount">0</div>
                            <div class="stat-label">興味表明数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="viewCount">0</div>
                            <div class="stat-label">閲覧数</div>
                        </div>
                    </div>
                </section>

                <!-- 登録した特許 -->
                <section class="section" id="patents">
                    <h2>登録した特許</h2>
                    <button class="add-btn" id="addPatentBtn">+ 特許を登録</button>

                    <h3 class="subheading">審査中（ペンディング）</h3>
                    <div id="pendingPatentsList">
                        <div class="empty-state">
                            <div class="empty-state-icon"></div>
                            <p>審査中の特許はありません</p>
                        </div>
                    </div>

                    <h3 class="subheading" style="margin-top: 2rem;">承認済み・却下</h3>
                    <div id="patentsList">
                        <div class="empty-state">
                            <div class="empty-state-icon"></div>
                            <p>登録した特許はまだありません</p>
                        </div>
                    </div>
                </section>

                <!-- 受信した興味表明 -->
                <section class="section" id="interests">
                    <h2>受信した興味表明</h2>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>特許名</th>
                                <th>企業名</th>
                                <th>表明日</th>
                                <th>メッセージ</th>
                            </tr>
                        </thead>
                        <tbody id="interestsTable">
                            <tr>
                                <td colspan="4">
                                    <div class="empty-state">
                                        <div class="empty-state-icon"></div>
                                        <p>興味表明はまだありません</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </main>
        </div>
    </div>

    <!-- 特許登録モーダル -->
    <div class="modal" id="patentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>特許を登録</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="patentForm">
                <div class="form-group">
                    <label>特許名 *</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>説明 *</label>
                    <textarea name="description" required></textarea>
                </div>
                <div class="form-group">
                    <label>解決できる課題 *</label>
                    <textarea name="problem" required placeholder="この特許が解決する課題や問題点を記入してください"></textarea>
                </div>
                <div class="form-group">
                    <label>何にどう使えるか *</label>
                    <textarea name="usage" required placeholder="具体的な用途や応用例を記入してください"></textarea>
                </div>
                <div class="form-group">
                    <label>他の特許との違い *</label>
                    <textarea name="advantage" required placeholder="他の類似技術との違いや優位性を記入してください"></textarea>
                </div>
                <div class="form-group">
                    <label>カテゴリー *</label>
                    <select name="category" required>
                        <option value="">選択してください</option>
                        <option value="ai">AI・機械学習</option>
                        <option value="iot">IoT</option>
                        <option value="medical">医療機器</option>
                        <option value="manufacturing">製造技術</option>
                        <option value="energy">エネルギー</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>特許番号</label>
                    <input type="text" name="patentNumber">
                </div>
                <div class="form-group">
                    <label>希望価格（円）</label>
                    <input type="number" name="price">
                </div>
                <button type="submit" class="submit-btn">登録する</button>
            </form>
        </div>
    </div>

    <script src="mypage-script.js"></script>
    <script>
        // ユーザー情報取得
        async function loadUserInfo() {
            console.log('=== loadUserInfo 開始 ===');
            try {
                console.log('1. /api/user を呼び出し中...');
                const response = await fetch('/api/user');
                console.log('2. レスポンス受信:', response.status, response.ok);
                
                if (response.ok) {
                    const user = await response.json();
                    console.log('3. ユーザー情報取得成功:', user);
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('welcomeName').textContent = user.name;
                } else {
                    console.error('4. 認証失敗 - ログイン画面へリダイレクト');
                    const errorText = await response.text();
                    console.error('エラー詳細:', errorText);
                    window.location.href = 'auth.html';
                }
            } catch (error) {
                console.error('5. エラー発生:', error);
                console.error('Error stack:', error.stack);
                window.location.href = 'auth.html';
            }
        }

        // 特許一覧取得
        async function loadPatents() {
            try {
                const response = await fetch('/api/patents?owner=me');
                if (!response.ok) return;

                const patents = await response.json();
                document.getElementById('patentCount').textContent = patents.length;

                // approval_status で分ける
                const pending = patents.filter(p => p.approvalStatus === 'pending' || p.approval_status === 'pending');
                const others = patents.filter(p => (p.approvalStatus || p.approval_status) !== 'pending');

                renderPatentCards('pendingPatentsList', pending, '審査中の特許はありません');
                renderPatentCards('patentsList', others, '登録した特許はまだありません');
            } catch (error) {
                console.error('Error loading patents:', error);
            }
        }

        function renderPatentCards(containerId, patents, emptyMessage) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (!patents || patents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"></div>
                        <p>${emptyMessage}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = patents.map(patent => {
                const approval = patent.approvalStatus || patent.approval_status;
                const approvalLabel = getApprovalStatusLabel(approval);
                return `
                    <div class="patent-card">
                        <div class="patent-title">
                            ${patent.title}
                            <span class="status-badge ${approval}">${approvalLabel}</span>
                        </div>
                        <div class="patent-meta">
                            <span>カテゴリー: ${patent.category || '-'}</span>
                            <span>承認状況: ${approvalLabel}</span>
                        </div>
                        <div class="patent-actions">
                            <button class="btn-edit" onclick="editPatent('${patent.id}')">編集</button>
                            <button class="btn-delete" onclick="deletePatent('${patent.id}')">削除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getApprovalStatusLabel(status) {
            const labels = {
                'pending': '審査中',
                'approved': '承認済み',
                'rejected': '却下'
            };
            return labels[status] || status;
        }

        // 興味表明一覧取得
        async function loadInterests() {
            try {
                const response = await fetch('/api/patent-interests');
                if (response.ok) {
                    const interests = await response.json();
                    document.getElementById('interestCount').textContent = interests.length;
                    
                    if (interests.length > 0) {
                        const tbody = document.getElementById('interestsTable');
                        tbody.innerHTML = interests.map(interest => `
                            <tr>
                                <td>${interest.patentTitle}</td>
                                <td>${interest.userName}</td>
                                <td>${new Date(interest.createdAt).toLocaleDateString('ja-JP')}</td>
                                <td>${interest.message || '-'}</td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading interests:', error);
            }
        }

        // メニュー切り替え
        document.querySelectorAll('.menu-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                
                document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(section).classList.add('active');
            });
        });

        // モーダル
        document.getElementById('addPatentBtn').addEventListener('click', () => {
            document.getElementById('patentModal').classList.add('active');
        });

        document.querySelector('.close-modal').addEventListener('click', () => {
            document.getElementById('patentModal').classList.remove('active');
        });

        // 特許登録
        document.getElementById('patentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/api/patents', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('特許を登録しました。管理者の承認後に公開されます。');
                    document.getElementById('patentModal').classList.remove('active');
                    e.target.reset();
                    loadPatents();
                } else {
                    alert('エラーが発生しました');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('エラーが発生しました');
            }
        });

        // ログアウト
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // ページ読み込み時
        loadUserInfo();
        loadPatents();
        loadInterests();
    </script>
</body>
</html>
